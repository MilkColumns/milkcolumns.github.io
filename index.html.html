
<script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<h2 class="sr-only">HEIC to JPG bulk converter — drop up to 20 HEIC files and download them as JPGs</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:1.5rem 0;max-width:680px;margin:0 auto}
#drop{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:background 0.15s;background:transparent}
#drop.over{background:var(--color-background-secondary)}
#drop-icon{font-size:32px;margin-bottom:12px;color:var(--color-text-secondary)}
#drop h3{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
#drop p{font-size:13px;color:var(--color-text-secondary)}
#file-input{display:none}
#browse-btn{margin-top:14px;padding:7px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
#browse-btn:hover{background:var(--color-background-secondary)}
#stats-row{display:flex;gap:10px;margin:1.25rem 0 0.5rem}
.stat-card{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem 1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
#action-row{display:flex;gap:10px;margin:1rem 0;align-items:center}
#convert-btn,#zip-btn,#clear-btn{padding:8px 20px;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
#convert-btn{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);font-weight:500}
#convert-btn:hover{opacity:0.85}
#zip-btn:hover,#clear-btn:hover{background:var(--color-background-secondary)}
#convert-btn:disabled{opacity:0.4;cursor:not-allowed}
#zip-btn:disabled{opacity:0.4;cursor:not-allowed}
#file-list{display:flex;flex-direction:column;gap:8px;margin-top:0.75rem}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)}
.file-name{flex:1;font-size:13px;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:12px;color:var(--color-text-secondary);min-width:52px;text-align:right}
.file-status{min-width:90px;text-align:right;font-size:12px;font-weight:500}
.status-waiting{color:var(--color-text-secondary)}
.status-converting{color:#185FA5}
.status-done{color:#0F6E56}
.status-error{color:#993C1D}
.dl-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;color:var(--color-text-primary);white-space:nowrap}
.dl-btn:hover{background:var(--color-background-secondary)}
.progress-bar-wrap{width:80px;height:6px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:#1D9E75;border-radius:3px;width:0;transition:width 0.2s}
#global-progress{margin:0.5rem 0 0;font-size:13px;color:var(--color-text-secondary)}
</style>

<div id="app">
  <div id="drop">
    <div id="drop-icon">⬆</div>
    <h3>Drop HEIC files here</h3>
    <p>Or browse to select — up to 20 files at once</p>
    <button id="browse-btn">Browse files</button>
    <input type="file" id="file-input" multiple accept=".heic,.heif,image/heic,image/heif">
  </div>

  <div id="stats-row" style="display:none">
    <div class="stat-card"><div class="stat-label">Files selected</div><div class="stat-val" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Converted</div><div class="stat-val" id="stat-done">0</div></div>
    <div class="stat-card"><div class="stat-label">Failed</div><div class="stat-val" id="stat-err">0</div></div>
  </div>

  <div id="action-row" style="display:none">
    <button id="convert-btn">Convert all</button>
    <button id="zip-btn" disabled>Download ZIP</button>
    <button id="clear-btn">Clear</button>
    <div style="flex:1"></div>
  </div>
  <div id="global-progress" style="display:none"></div>
  <div id="file-list"></div>
</div>

<script>
const MAX = 20;
let files = [];
let blobs = {};

const drop = document.getElementById('drop');
const fileInput = document.getElementById('file-input');
const browseBtn = document.getElementById('browse-btn');
const convertBtn = document.getElementById('convert-btn');
const zipBtn = document.getElementById('zip-btn');
const clearBtn = document.getElementById('clear-btn');
const fileList = document.getElementById('file-list');
const statsRow = document.getElementById('stats-row');
const actionRow = document.getElementById('action-row');
const globalProgress = document.getElementById('global-progress');
const statTotal = document.getElementById('stat-total');
const statDone = document.getElementById('stat-done');
const statErr = document.getElementById('stat-err');

browseBtn.onclick = () => fileInput.click();
fileInput.onchange = e => addFiles(Array.from(e.target.files));

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); addFiles(Array.from(e.dataTransfer.files)); });

function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }

function addFiles(newFiles){
  const heicOnly = newFiles.filter(f => f.name.toLowerCase().match(/\.(heic|heif)$/i) || f.type === 'image/heic' || f.type === 'image/heif');
  const combined = [...files, ...heicOnly].slice(0, MAX);
  if(heicOnly.length !== newFiles.length) alert('Only HEIC/HEIF files are accepted.');
  if(combined.length >= MAX) alert('Max 20 files. Extra files were ignored.');
  files = combined;
  blobs = {};
  renderList();
}

function renderList(){
  fileList.innerHTML = '';
  blobs = {};
  statsRow.style.display = files.length ? 'flex' : 'none';
  actionRow.style.display = files.length ? 'flex' : 'none';
  globalProgress.style.display = 'none';
  statTotal.textContent = files.length;
  statDone.textContent = '0';
  statErr.textContent = '0';
  convertBtn.disabled = false;
  zipBtn.disabled = true;

  files.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.id = 'row-' + i;
    row.innerHTML = `
      <div class="file-name" title="${f.name}">${f.name}</div>
      <div class="file-size">${fmtSize(f.size)}</div>
      <span class="file-status status-waiting" id="status-${i}">Waiting</span>
      <div class="progress-bar-wrap" id="prog-wrap-${i}" style="display:none"><div class="progress-bar" id="prog-${i}"></div></div>
      <div id="dl-${i}"></div>
    `;
    fileList.appendChild(row);
  });
}

convertBtn.onclick = async () => {
  if(!files.length) return;
  convertBtn.disabled = true;
  clearBtn.disabled = true;
  zipBtn.disabled = true;
  blobs = {};
  let done = 0, errs = 0;
  globalProgress.style.display = 'block';
  globalProgress.textContent = `Converting 0 of ${files.length}…`;

  for(let i = 0; i < files.length; i++){
    const f = files[i];
    const statusEl = document.getElementById('status-'+i);
    const progWrap = document.getElementById('prog-wrap-'+i);
    const prog = document.getElementById('prog-'+i);
    const dlEl = document.getElementById('dl-'+i);

    statusEl.className = 'file-status status-converting';
    statusEl.textContent = 'Converting…';
    progWrap.style.display = 'block';
    prog.style.width = '40%';

    try {
      const blob = await heic2any({ blob: f, toType: 'image/jpeg', quality: 0.92 });
      const outBlob = Array.isArray(blob) ? blob[0] : blob;
      blobs[i] = outBlob;
      prog.style.width = '100%';
      statusEl.className = 'file-status status-done';
      statusEl.textContent = 'Done';
      const url = URL.createObjectURL(outBlob);
      const outName = f.name.replace(/\.(heic|heif)$/i, '.jpg');
      dlEl.innerHTML = `<a href="${url}" download="${outName}"><button class="dl-btn">Download</button></a>`;
      done++;
      statDone.textContent = done;
    } catch(e) {
      prog.style.width = '100%';
      prog.style.background = '#E24B4A';
      statusEl.className = 'file-status status-error';
      statusEl.textContent = 'Failed';
      errs++;
      statErr.textContent = errs;
    }
    globalProgress.textContent = `Converted ${done + errs} of ${files.length} (${done} succeeded, ${errs} failed)`;
  }

  clearBtn.disabled = false;
  if(done > 1) zipBtn.disabled = false;
  globalProgress.textContent = `Done — ${done} converted, ${errs} failed.`;
};

zipBtn.onclick = async () => {
  if(!Object.keys(blobs).length) return;
  zipBtn.disabled = true;
  zipBtn.textContent = 'Zipping…';
  const zip = new JSZip();
  for(const i in blobs){
    const outName = files[i].name.replace(/\.(heic|heif)$/i, '.jpg');
    zip.file(outName, blobs[i]);
  }
  const content = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(content);
  const a = document.createElement('a');
  a.href = url; a.download = 'converted-jpgs.zip'; a.click();
  zipBtn.disabled = false;
  zipBtn.textContent = 'Download ZIP';
};

clearBtn.onclick = () => {
  files = []; blobs = {};
  fileList.innerHTML = '';
  statsRow.style.display = 'none';
  actionRow.style.display = 'none';
  globalProgress.style.display = 'none';
  fileInput.value = '';
};
</script>
